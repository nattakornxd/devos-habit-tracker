<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOS — Memorable Moments</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2D4A3E" />
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DevOS" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #F7F5F0;
      --surface:    #FFFFFF;
      --primary:    #2D4A3E;
      --primary-lt: #E8EFEA;
      --text:       #2C332F;
      --text-sub:   #7A827E;
      --border:     #E2E4E0;
      --red:        #C0392B;
      --radius-sm:  8px;
      --radius-md:  16px;
      --radius-lg:  24px;
      --shadow-sm:  0 2px 8px rgba(45,74,62,0.05);
      --shadow-md:  0 4px 16px rgba(45,74,62,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    #auth-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-msg { text-align: center; background: var(--surface); padding: 40px 48px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
    .auth-msg p { color: var(--text-sub); margin-bottom: 16px; font-family: 'Sarabun', sans-serif; }
    .btn-go { display: inline-block; padding: 11px 28px; background: var(--primary); color: #fff; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; text-decoration: none; }

    #app { display: none; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
    .logo span { color: var(--text-sub); }
    .header-nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: var(--surface); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-sm); font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text); text-decoration: none; font-family: inherit; }
    .nav-btn:hover  { background: var(--primary); color: #fff; border-color: var(--primary); }
    .nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .page-header { margin-bottom: 20px; }
    .page-header .label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-sub); margin-bottom: 4px; }
    .page-header h2 { font-size: 2rem; font-weight: 700; color: var(--primary); }

    .stats-bar { display: flex; gap: 24px; margin-bottom: 20px; padding: 14px 20px; background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    .stat-lbl { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--text-sub); }
    .filter-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--surface); color: var(--text-sub); transition: all 0.18s; font-family: inherit; }
    .filter-btn:hover  { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(226,228,224,0.6); }

    .month-header { font-size: 1rem; font-weight: 600; color: var(--primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--primary-lt); display: flex; align-items: center; gap: 8px; }

    .journal-table-container { width: 100%; overflow-x: auto; }
    .journal-table { width: 100%; border-collapse: collapse; text-align: left; }
    .journal-table th, .journal-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .journal-table th { font-size: 0.75rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
    .journal-table td.date-col { width: 100px; font-weight: 600; color: var(--primary); vertical-align: top; white-space: nowrap; font-size: 13px; }
    .journal-table td.moment-col { font-family: 'Sarabun', sans-serif; color: var(--text); line-height: 1.75; font-size: 14px; }
    .journal-table tr:last-child td { border-bottom: none; }
    .journal-table tr:hover td { background: var(--bg); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-sub); font-family: 'Sarabun', sans-serif; }
    .empty-state svg { opacity: 0.25; display: block; margin: 0 auto 12px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { display: block; margin-top: 6px; font-size: 12px; }
    .error-box { background: #fff5f5; border: 1px solid #fecaca; border-radius: var(--radius-md); padding: 14px 18px; color: var(--red); font-size: 13px; margin-bottom: 16px; font-family: 'Sarabun', sans-serif; }

    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(247,245,240,0.85); backdrop-filter: blur(2px); z-index: 50; align-items: center; justify-content: center; }
    .loading-overlay.active { display: flex; }
    .loading-box { background: var(--surface); border-radius: var(--radius-lg); padding: 32px 48px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(45,74,62,0.12); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 14px; font-weight: 700; color: var(--primary); }

    #dbg { display: none; position: fixed; bottom: 44px; left: 10px; background: #1A3A2A; color: #7EC8A4; padding: 10px 14px; font-size: 11px; border-radius: var(--radius-sm); z-index: 997; max-width: 400px; font-family: monospace; line-height: 1.6; max-height: 260px; overflow-y: auto; word-break: break-all; }
    #dbg-toggle { position: fixed; bottom: 10px; left: 10px; background: rgba(45,74,62,0.7); color: #7EC8A4; border: none; padding: 4px 9px; border-radius: 5px; font-size: 10px; font-weight: 700; cursor: pointer; z-index: 998; font-family: monospace; opacity: 0.35; transition: opacity 0.2s; }
    #dbg-toggle:hover { opacity: 1; }
    /* ── MOBILE BOTTOM NAV ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 300;
      box-shadow: 0 -2px 10px rgba(45,74,62,0.07);
    }
    .mobile-nav-inner { display: flex; }
    .mobile-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 4px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-sub);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .mobile-nav-item svg {
      width: 22px; height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 2px;
    }
    .mobile-nav-item.active { color: var(--primary); }
    .mobile-nav-item:active { opacity: 0.65; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .mobile-nav { display: block; }
      .container { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }

      /* Header: ซ่อน nav links ทั้งหมด (ยกเว้น logout ถูกซ่อนด้วย bottom nav) */
      header { padding: 16px 0; margin-bottom: 20px; }
      .header-nav { display: none; }

      /* Stats bar: wrap */
      .stats-bar { flex-wrap: wrap; gap: 12px 24px; }

      /* Filter bar: scroll แนวนอน */
      .filter-bar {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar { display: none; }

      /* Page header */
      .page-header h2 { font-size: 1.6rem; }

      /* Journal Table → Card Layout บนมือถือ */
      .journal-table-container { overflow-x: visible; }
      .journal-table,
      .journal-table tbody { display: block; }
      .journal-table thead { display: none; }
      .journal-table tr {
        display: block;
        background: var(--surface);
        border-radius: var(--radius-md);
        margin-bottom: 10px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      .journal-table td { display: block; border: none; padding: 2px 0; }
      .journal-table td.date-col {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-sub);
        white-space: normal;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .journal-table td.moment-col { font-size: 14px; line-height: 1.75; }
      .journal-table tr:hover td { background: transparent; }

      /* Month header */
      .month-header { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-msg">
    <p>กรุณาเข้าสู่ระบบก่อน</p>
    <a class="btn-go" href="index.html">ไปหน้า Login</a>
  </div>
</div>

<div id="app">
  <div class="container">
    <header>
      <div class="logo">DEV<span>OS</span></div>
      <div class="header-nav">
        <a class="nav-btn" href="index.html">Daily Log</a>
        <a class="nav-btn active" href="journal.html">Moments</a>
        <a class="nav-btn" href="stats.html">Statistics</a>
        <button class="nav-btn" id="btn-logout">ออกจากระบบ</button>
      </div>
    </header>
    <main>
      <div class="page-header">
        <div class="label">Memory Archive</div>
        <h2>Memorable Moments</h2>
      </div>
      <div class="stats-bar">
        <div class="stat-item"><span class="stat-num" id="stat-total">—</span><span class="stat-lbl">บันทึกทั้งหมด</span></div>
        <div class="stat-item"><span class="stat-num" id="stat-months">—</span><span class="stat-lbl">เดือน</span></div>
        <div class="stat-item"><span class="stat-num" id="stat-latest">—</span><span class="stat-lbl">วันล่าสุด</span></div>
      </div>
      <div class="filter-bar">
        <span class="filter-label">แสดง</span>
        <button class="filter-btn active" data-months="all">ทั้งหมด</button>
        <button class="filter-btn" data-months="3">3 เดือน</button>
        <button class="filter-btn" data-months="1">เดือนนี้</button>
      </div>
      <div id="error-area"></div>
      <div id="journal-content"></div>
    </main>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-title">กำลังโหลด...</div>
  </div>
</div>

<!-- ══ MOBILE BOTTOM NAV ══ -->
<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a class="mobile-nav-item" href="index.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Daily
    </a>
    <a class="mobile-nav-item active" href="journal.html">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Moments
    </a>
    <a class="mobile-nav-item" href="stats.html">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </a>
    <button class="mobile-nav-item" onclick="document.getElementById('btn-logout').click()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      ออกจากระบบ
    </button>
  </div>
</nav>

<div id="dbg"></div>
<button id="dbg-toggle">LOG</button>

<script>
const SUPABASE_URL  = 'https://lyncszmpwojopbvkmqmc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5bmNzem1wd29qb3BidmttcW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTgwODIsImV4cCI6MjA5Nzc5NDA4Mn0.fzOPawbNz3kQTK5L4uVlDnWUxwgZ-V4suBFYD-tpcP4';
// Supabase client — only for signOut (no auth state detection)
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allRows      = [];
let filterMonths = 'all';

// ── DEBUG ──
function dbg(msg) {
  const el = document.getElementById('dbg');
  const d  = document.createElement('div');
  d.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  console.log('[J]', msg);
}
document.getElementById('dbg-toggle').addEventListener('click', () => {
  const p = document.getElementById('dbg');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
});
function setLoading(on) { document.getElementById('loading').classList.toggle('active', on); }
function showError(msg)  { document.getElementById('error-area').innerHTML = `<div class="error-box">${msg}</div>`; }

// ── READ SESSION DIRECTLY FROM LOCALSTORAGE ──
// หลีกเลี่ยง Supabase client token-refresh deadlock
function getStoredSession() {
  try {
    // Supabase v2 key format: sb-{ref}-auth-token
    const key  = `sb-lyncszmpwojopbvkmqmc-auth-token`;
    const raw  = localStorage.getItem(key);
    if (!raw) {
      dbg('no session in localStorage key: ' + key);
      // fallback: scan all keys
      const fallback = Object.keys(localStorage).find(k => k.includes('supabase') && k.includes('auth'));
      if (fallback) {
        dbg('fallback key: ' + fallback);
        const d = JSON.parse(localStorage.getItem(fallback) || '{}');
        if (d?.access_token) return d;
      }
      return null;
    }
    const data = JSON.parse(raw);
    dbg(`session found, user: ${data?.user?.email ?? 'unknown'}`);
    return data;
  } catch(e) {
    dbg('getStoredSession error: ' + e.message);
    return null;
  }
}

// ── FETCH MOMENTS — raw fetch, no Supabase client ──
async function fetchMoments(userId, token) {
  const url = `${SUPABASE_URL}/rest/v1/daily_logs` +
    `?select=log_date,memorable_moments` +
    `&user_id=eq.${userId}` +
    `&memorable_moments=not.is.null` +
    `&order=log_date.desc`;

  dbg(`GET ${url.slice(0,80)}...`);

  const res = await fetch(url, {
    headers: {
      'apikey':        SUPABASE_ANON,
      'Authorization': `Bearer ${token}`,
      'Accept':        'application/json',
    }
  });

  dbg(`HTTP ${res.status}`);
  if (!res.ok) {
    const txt = await res.text();
    dbg('error body: ' + txt.slice(0, 300));
    throw new Error(`HTTP ${res.status} — ${txt.slice(0, 120)}`);
  }

  const data = await res.json();
  dbg(`rows returned: ${data.length}`);
  // filter out truly empty strings client-side
  return (data || []).filter(r => r.memorable_moments?.trim());
}

// ── DATE HELPERS ──
function thaiDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
}
function thaiMonthYear(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('th-TH', { month:'long', year:'numeric' });
}
function monthKey(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FILTER ──
function filterRows(rows) {
  if (filterMonths === 'all') return rows;
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - parseInt(filterMonths));
  const cut = cutoff.toISOString().slice(0, 10);
  return rows.filter(r => r.log_date >= cut);
}

// ── RENDER ──
function render(rows) {
  const filtered = filterRows(rows);
  const allMonths = new Set(rows.map(r => monthKey(r.log_date)));
  document.getElementById('stat-total').textContent  = rows.length;
  document.getElementById('stat-months').textContent = allMonths.size;
  document.getElementById('stat-latest').textContent = rows.length ? thaiDate(rows[0].log_date) : '—';

  const content = document.getElementById('journal-content');
  if (!filtered.length) {
    content.innerHTML = `
      <div class="card">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <p>${rows.length > 0 ? 'ไม่มีข้อมูลในช่วงเวลาที่เลือก' : 'ยังไม่มี Memorable Moments'}</p>
          <small>${rows.length === 0 ? 'บันทึกได้ที่ช่อง "Memorable Moments" ในหน้า Daily Log' : ''}</small>
        </div>
      </div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(r => { const k = monthKey(r.log_date); (grouped[k] = grouped[k]||[]).push(r); });

  content.innerHTML = Object.entries(grouped).map(([, mRows]) => `
    <div class="card">
      <div class="month-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        ${thaiMonthYear(mRows[0].log_date)}
      </div>
      <div class="journal-table-container">
        <table class="journal-table">
          <thead><tr><th>วันที่</th><th>บันทึก</th></tr></thead>
          <tbody>${mRows.map(r => `
            <tr>
              <td class="date-col">${thaiDate(r.log_date)}</td>
              <td class="moment-col">${escHtml(r.memorable_moments)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`).join('');
}

// ── FILTER BUTTONS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMonths = btn.dataset.months;
    render(allRows);
  });
});

// ── LOGOUT ──
document.getElementById('btn-logout').addEventListener('click', async () => {
  try { await Promise.race([sb.auth.signOut(), new Promise(r => setTimeout(r, 3000))]); } catch(e) {}
  Object.keys(localStorage).filter(k => k.includes('supabase')).forEach(k => localStorage.removeItem(k));
  window.location.href = 'index.html';
});

// ── INIT — read session from localStorage directly (NO onAuthStateChange deadlock) ──
async function init() {
  dbg('init start');
  const session = getStoredSession();

  if (!session?.access_token || !session?.user) {
    dbg('no valid session → show auth gate');
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('app').style.display       = 'none';
    setLoading(false);
    return;
  }

  dbg(`user: ${session.user.email}`);
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display       = 'block';

  setLoading(true);
  // Safety: ถ้า fetch ค้าง > 15s ให้แสดง error แทน
  const safetyTimer = setTimeout(() => {
    setLoading(false);
    showError('โหลดนานเกินไป — กรุณา <a href="journal.html">Refresh</a>');
    dbg('SAFETY TIMEOUT 15s fired');
  }, 15000);

  try {
    allRows = await fetchMoments(session.user.id, session.access_token);
    render(allRows);
    document.getElementById('error-area').innerHTML = '';
    dbg('done, rows: ' + allRows.length);
  } catch(e) {
    dbg('FETCH ERROR: ' + e.message);
    showError('โหลดข้อมูลไม่สำเร็จ: ' + e.message);
  } finally {
    clearTimeout(safetyTimer);
    setLoading(false);
  }
}

// รัน init ทันทีที่ DOM พร้อม
init();
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(r => console.log('[SW] registered', r.scope))
        .catch(e => console.warn('[SW] failed', e));
    });
  }
</script>
